<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Edit / Delete</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="showHelp()">Help</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Edit / Delete</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Load item by name</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Item Name *</ion-label>
        <ion-input [(ngModel)]="lookupName" placeholder="Exact item name"></ion-input>
      </ion-item>

      <div class="ion-padding-top">
        <ion-button expand="block" (click)="loadByName()" [disabled]="loading">Load</ion-button>
      </div>

      <div class="ion-padding-top" *ngIf="loading">
        <ion-spinner></ion-spinner>
      </div>
      <div class="ion-padding-top" *ngIf="message">
        <ion-text color="success">{{ message }}</ion-text>
      </div>
      <div class="ion-padding-top" *ngIf="errorMessage">
        <ion-text color="danger">{{ errorMessage }}</ion-text>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Update record</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form [formGroup]="form" (ngSubmit)="update()">
        <ion-item>
          <ion-label position="stacked">Item Name *</ion-label>
          <ion-input formControlName="item_name"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Category *</ion-label>
          <ion-select formControlName="category" interface="popover">
            <ion-select-option *ngFor="let c of categories" [value]="c">{{ c }}</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Quantity *</ion-label>
          <ion-input formControlName="quantity" type="number" inputmode="numeric" min="0"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Price (integer) *</ion-label>
          <ion-input formControlName="price" type="number" inputmode="numeric"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Supplier Name *</ion-label>
          <ion-input formControlName="supplier_name"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Stock Status *</ion-label>
          <ion-select formControlName="stock_status" interface="popover">
            <ion-select-option *ngFor="let s of stockStatuses" [value]="s">{{ s }}</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Featured Item (0 or 1)</ion-label>
          <ion-input formControlName="featured_item" type="number" inputmode="numeric" min="0" max="1"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Special Note (optional)</ion-label>
          <ion-input formControlName="special_note"></ion-input>
        </ion-item>

        <div class="ion-padding-top">
          <ion-button type="submit" expand="block" [disabled]="loading || !loadedName">Update</ion-button>
          <ion-button type="button" expand="block" color="danger" fill="outline" (click)="delete()" [disabled]="loading">
            Delete
          </ion-button>
        </div>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
